<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="320" viewBox="0 0 1500 320" role="img" aria-labelledby="title desc">
  <title id="title">Data Pipeline Flow</title>
  <desc id="desc">Raw dataset flows through a processing engine, MediaPipe tracking, structured CSV output, and temporal modeling.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#333" />
    </marker>
    <style>
      .node { stroke: #333; stroke-width: 2px; }
      .label { font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111; }
      .sub { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #333; }
      .edge { stroke: #333; stroke-width: 2px; fill: none; marker-end: url(#arrow); }
      .edge-label { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #333; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#fff" />

  <rect class="node" x="30" y="135" width="190" height="100" rx="10" fill="#ff99ff" />
  <text class="label" x="125" y="175" text-anchor="middle">Raw Dataset</text>
  <text class="sub" x="125" y="202" text-anchor="middle">22.8 GB / 148k</text>
  <text class="sub" x="125" y="224" text-anchor="middle">Video Folders</text>

  <rect class="node" x="330" y="135" width="220" height="100" rx="50" fill="#fff" />
  <text class="label" x="440" y="175" text-anchor="middle">Processing Engine</text>
  <text class="sub" x="440" y="202" text-anchor="middle">M5 Max / Python 3.9</text>

  <path class="node" d="M810 112 L950 185 L810 258 L670 185 Z" fill="#fff" />
  <text class="label" x="810" y="176" text-anchor="middle">MediaPipe Tracking</text>
  <text class="sub" x="810" y="204" text-anchor="middle">21 3D Landmarks</text>

  <rect class="node" x="1070" y="135" width="210" height="100" rx="10" fill="#bbbbff" />
  <text class="label" x="1175" y="175" text-anchor="middle">Structured Output</text>
  <text class="sub" x="1175" y="202" text-anchor="middle">3.24 GB CSV</text>

  <rect class="node" x="1380" y="135" width="110" height="100" rx="55" fill="#bbffbb" />
  <text class="label" x="1435" y="175" text-anchor="middle">Temporal</text>
  <text class="label" x="1435" y="201" text-anchor="middle">Modeling</text>
  <text class="sub" x="1435" y="224" text-anchor="middle">30 frames</text>

  <path class="edge" d="M220 185 H320" />
  <text class="edge-label" x="270" y="125" text-anchor="middle">File I/O</text>

  <path class="edge" d="M550 185 H660" />
  <text class="edge-label" x="605" y="125" text-anchor="middle">Computer Vision</text>

  <path class="edge" d="M950 185 H1060" />
  <text class="edge-label" x="1005" y="125" text-anchor="middle">Dimensionality Reduction</text>

  <path class="edge" d="M1280 185 H1370" />
  <text class="edge-label" x="1325" y="125" text-anchor="middle">Normalization</text>
</svg>
